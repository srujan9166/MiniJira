spring.application.name=minijira

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/minijira}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:srujan}

spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB

spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:3e340cd7c5dfe6}
spring.mail.password=${MAIL_PASSWORD:3448ef09b57506}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jwt.secret=${JWT_SECRET:defaultsecretkeydefaultsecretkey123456}
jwt.expiration=${JWT_EXPIRATION:900000}


